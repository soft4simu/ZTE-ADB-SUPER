name: BlackMan V2 Tool Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install pyinstaller setuptools pywin32
      - name: Build EXE
        run: pyinstaller --noconsole --onefile --uac-admin --icon=icon.ico ZTEADB.PY
      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: BlackManV2_Tool
          path: dist/ZTEADB.exe
          
